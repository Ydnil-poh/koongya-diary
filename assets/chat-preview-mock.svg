  <text x="1218" y="67" font-size="20" font-family="sans-serif" fill="#1f1f1f">✕</text>

  <rect x="670" y="100" width="580" height="430" rx="6" fill="#fff" stroke="#1f1f1f" stroke-width="3"/>
