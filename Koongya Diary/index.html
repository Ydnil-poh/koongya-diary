<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿵야 다이어리 - Koongya Diary</title>
    <!-- 네트워크 최적화: 외부 CDN 서버 사전 연결 -->
    <link rel="preconnect" href="https://nquysdhnktaburanulwt.supabase.co">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://esm.run">
    <link rel="dns-prefetch" href="https://nquysdhnktaburanulwt.supabase.co">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 로딩 오버레이 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>쿵야의 정원을 불러오는 중...</p>
    </div>

    <!-- 토스트 알림 컨테이너 -->
    <div id="toast-container"></div>

    <!-- 로그인 화면 UI (초기에는 숨김 처리하여 세션 복구 대기) -->
    <div id="login-screen" class="login-container" style="display: none;">
        <h1 class="login-title">쿵야 다이어리</h1>
        <p class="login-subtitle">쿵야의 정원에서 함께쓰는 교환일기</p>
        
        <div class="login-box">
            <!-- 이메일 로그인 -->
            <div class="email-login-group">
                <input type="email" id="email-input" placeholder="이메일 주소">
                <input type="password" id="password-input" placeholder="비밀번호">
                <button id="email-login-btn" class="ui-button">이메일로 시작하기</button>
            </div>
            
            <div class="divider">- 또는 -</div>
            
            <!-- 구글 소셜 로그인 -->
            <button id="google-login-btn" class="ui-button google-btn">
                🌐 구글 계정으로 로그인
            </button>            
        </div>
    </div>

    <!-- 최초 접속 시 노출되는 환영 문구 -->
    <div id="welcome-message" class="welcome-text">반가워요!...</div>

    <!-- 상단: 핀보드(졸업 앨범) 이동 버튼 -->
    <button id="archive-btn" class="ui-button">앨범 보기</button>

    <!-- 3x3 아이소메트릭 픽셀 아트 정원 공간 -->
    <div class="garden-container">
        <div class="isometric-grid" id="grid-container">
            <!-- 9개의 빈 셀 (data-index로 위치 식별) -->
            <div class="cell empty" data-index="0"></div>
            <div class="cell empty" data-index="1"></div>
            <div class="cell empty" data-index="2"></div>
            <div class="cell empty" data-index="3"></div>
            <div class="cell empty" data-index="4"></div>
            <div class="cell empty" data-index="5"></div>
            <div class="cell empty" data-index="6"></div>
            <div class="cell empty" data-index="7"></div>
            <div class="cell empty" data-index="8"></div>
        </div>
    </div>

    <!-- 빈 셀 클릭 시 나타날 씨앗 선택 팝업 -->
    <div id="seed-popup" class="hidden">
        <!-- app.js가 이 안의 내용을 채웁니다 -->
    </div>

    <!-- 1. 캐릭터 전용 대화 패널 -->
    <div id="chat-panel" class="hidden">
        <div class="chat-header">
            <span id="chat-koongya-name">쿵야</span>와의 대화
            <button id="close-chat">X</button>
        </div>
        <div class="chat-log" id="chat-log">
            <!-- 말풍선 대화가 쌓이는 곳 -->
        </div>
        <!-- 응답 대기 중 '...' 애니메이션 영역 -->
        <div id="chat-loading" class="hidden">쿵야가 생각 중이에요...</div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="쿵야에게 말 걸기...">
            <button id="send-btn">전송</button>
            <!-- 5-3-1 로직에 따라 대화 횟수 충족 시 나타날 회고 버튼 -->
            <button id="retrospective-btn" class="hidden" style="background-color: #ff9800;">회고하기</button>
        </div>
    </div>

    <!-- 2. 2분할 회고 화면 (일기장) -->
    <div id="retrospective-panel" class="hidden">
        <div class="retro-container">
            <!-- 좌측: AI Insight -->
            <div class="retro-left">
                <h3>
                    AI Insight
                    <button id="regenerate-insight-btn" class="regenerate-btn">새로고침 🔄</button>
                </h3>
                <div id="ai-keywords">
                    <!-- AI가 분석한 핵심 키워드와 가이드 질문이 나옵니다 -->
                </div>
            </div>
            <!-- 우측: My Diary -->
            <div class="retro-right">
                <h3>Diary</h3>
                <textarea id="diary-input" placeholder="오늘 쿵야와 나눈 대화를 바탕으로 당신의 생각을 적어보세요..."></textarea>
            </div>
        </div>

        <div class="retro-footer">
            <button id="close-retrospective" class="retro-button retro-button-close">다음에 적기</button>
            <button id="save-diary-btn" class="retro-button retro-button-save">일기 저장하고 진화하기</button>
        </div>
    </div>

    <!-- 3. 졸업 축하 모달 -->
    <div id="graduation-modal" class="hidden">
        <div class="graduation-content">
            <h2>🎉 졸업을 축하합니다! 🎉</h2>
            <p>당신의 생각이 한 뼘 더 자라나 쿵야가 떠날 준비를 마쳤습니다.</p>
            
            <div class="polaroid" id="graduation-polaroid">
                <div class="polaroid-image">
                    <img id="grad-koongya-img" src="" alt="졸업 쿵야">
                </div>
                <div class="polaroid-caption">
                    <p id="grad-core-question">"과연 나는 어떤 사람인가요?"</p>
                    <span id="grad-date">2026.04.22</span>
                </div>
            </div>
            
            <button id="close-graduation-modal" class="retro-button retro-button-save">정원으로 돌아가기</button>
        </div>
    </div>

    <!-- 4. 졸업 앨범 (아카이브) 패널 -->
    <div id="archive-panel" class="hidden">
        <div class="archive-header">
            <h3>추억의 앨범</h3>
            <button id="close-archive">닫기</button>
        </div>
        <div class="archive-list" id="archive-list">
            <!-- 졸업한 쿵야 폴라로이드들이 쌓이는 곳 -->
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
