  <text x="916" y="335" font-size="17" font-family="sans-serif" fill="#fff">갑자기 마음이 편해졌어.</text>

  <rect x="670" y="548" width="320" height="130" rx="6" fill="#fff" stroke="#1f1f1f" stroke-width="3"/>
