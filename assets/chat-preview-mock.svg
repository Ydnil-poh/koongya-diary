  <text x="700" y="139" font-size="16" font-family="sans-serif" fill="#5f4a00">짧은 답장보다, 지금 마음에 남은 장면을 2~3문장으로 들려줘.</text>

  <rect x="700" y="185" width="320" height="60" rx="14" fill="#f0f0f0"/>
